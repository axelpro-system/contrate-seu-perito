<div class="forgot-wrapper">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Recuperar Senha</mat-card-title>
            <mat-card-subtitle>Digite seu email para receber o link de redefinição</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="seu@email.com">
                    @if (resetForm.get('email')?.hasError('required')) {
                    <mat-error>Email é obrigatório</mat-error>
                    }
                    @if (resetForm.get('email')?.hasError('email')) {
                    <mat-error>Email inválido</mat-error>
                    }
                </mat-form-field>

                <div class="actions">
                    <button mat-flat-button color="primary" type="submit" [disabled]="resetForm.invalid || loading">
                        {{ loading ? 'Enviando...' : 'Enviar Link' }}
                    </button>
                </div>
            </form>
        </mat-card-content>
        <mat-card-footer>
            <p>Lembrou a senha? <a routerLink="/login">Faça Login</a></p>
        </mat-card-footer>
    </mat-card>
</div>
