<div class="edit-profile-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Editar Perfil Profissional</mat-card-title>
            <mat-card-subtitle>Mantenha seus dados atualizados para atrair mais clientes</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
                <div class="form-row">
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Nome Completo</mat-label>
                        <input matInput formControlName="full_name" placeholder="Seu nome">
                    </mat-form-field>
                </div>

                <div class="form-row">
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Especialidade</mat-label>
                        <input matInput formControlName="specialty"
                            placeholder="Ex: Engenharia Civil, Medicina do Trabalho">
                    </mat-form-field>
                </div>

                <div class="form-row">
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Biografia / Sobre Mim</mat-label>
                        <textarea matInput formControlName="bio" rows="5"
                            placeholder="Descreva sua experiência e qualificações..."></textarea>
                        <mat-hint align="end">{{profileForm.get('bio')?.value?.length || 0}} caracteres</mat-hint>
                    </mat-form-field>
                </div>

                <div class="form-row two-col">
                    <mat-form-field appearance="outline">
                        <mat-label>Telefone / WhatsApp</mat-label>
                        <input matInput formControlName="phone" placeholder="(00) 00000-0000">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Valor Hora (R$)</mat-label>
                        <input matInput type="number" formControlName="hourly_rate" placeholder="0.00">
                        <span matTextPrefix>R$&nbsp;</span>
                    </mat-form-field>
                </div>

                <div class="form-row two-col">
                    <mat-form-field appearance="outline">
                        <mat-label>Cidade</mat-label>
                        <input matInput formControlName="city">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Estado</mat-label>
                        <input matInput formControlName="state" placeholder="UF">
                    </mat-form-field>
                </div>

                <div class="actions">
                    <button mat-raised-button color="primary" type="submit" [disabled]="profileForm.invalid || loading">
                        {{ loading ? 'Salvando...' : 'Salvar Alterações' }}
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
